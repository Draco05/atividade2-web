<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Admin</title>
</head>

<body>
    <nav>
        <ul>
            <li><a href="index.html">Página Principal</a></li>
        </ul>
    </nav>
    <div id="itens"></div>
    <section class="container-cadastro">
        <form id="formCadastroPocao" class="form-cadastro">
            <h2>Cadastrar Nova Poção</h2>
            <p>Preencha os campos abaixo para adicionar um novo artefato místico ao estoque.</p>

            <div class="campo-grupo">
                <label for="nome">Nome da Poção</label>
                <input type="text" id="nome" required placeholder="Ex: Poção Blue Sky">
            </div>

            <div class="campo-grupo">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" required placeholder="Descreva os efeitos mágicos e colaterais..."></textarea>
            </div>

            <div class="campo-grupo-linha">
                <div class="campo-grupo">
                    <label for="preco">Valor (Moedas)</label>
                    <input type="number" id="preco" required min="1" placeholder="Ex: 300">
                </div>

                <div class="campo-grupo">
                    <label for="imagemUrl">Foto (URL da Imagem)</label>
                    <input type="text" id="imagemUrl" required placeholder="Ex: /img/pocao.png">
                </div>
            </div>

            <button type="submit" class="btn-enviar-cadastro">Adicionar ao Estoque</button>
        </form>
    </section>
    <script src="js/admin.js"></script>
</body>

</html>
