<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container-login">
    <form class="form-login" id="formLogin">
      <h2>Área de Administração</h2>
      <p>Entre com suas credenciais para gerenciar o estoque</p>
      
      <div class="campo-grupo">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" required placeholder="Digite seu usuário">
      </div>
      
      <div class="campo-grupo">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" required placeholder="Digite sua senha">
      </div>

      <h3 id="erro-msg">Senha ou usuário incorreto!</h3>
      
      <button type="submit" class="btn-enviar">Entrar</button>
      
      <a href="index.html" class="link-voltar">← Voltar para a loja</a>
    </form>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
